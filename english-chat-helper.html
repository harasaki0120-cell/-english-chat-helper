<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="英語ヘルパー">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#4338ca">
  <title>英語チャットヘルパー</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --p:#5046e5; --p2:#818cf8; --g:#059669; --g2:#34d399;
      --a:#d97706; --bg:#eef2ff;
      --safe-top: env(safe-area-inset-top,0px);
      --safe-bot: env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; overscroll-behavior:none; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue','Hiragino Sans',sans-serif;
      background:var(--bg);
      padding-bottom:calc(74px + var(--safe-bot));
      -webkit-overflow-scrolling:touch;
    }
    input,textarea,select { font-size:16px!important; outline:none; -webkit-appearance:none; }
    textarea { resize:none; }

    /* ── Header ── */
    .app-header {
      position:sticky; top:0; z-index:40;
      background:linear-gradient(150deg,#312e81 0%,#4f46e5 55%,#6366f1 100%);
      padding:calc(14px + var(--safe-top)) max(16px,env(safe-area-inset-left,16px)) 14px;
    }

    /* ── Stepper ── */
    .stepper-bar { background:#fff; border-bottom:1px solid #e0e7ff; padding:12px 16px; }
    .snode {
      width:30px; height:30px; border-radius:50%; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:800;
      transition:background .35s, transform .25s cubic-bezier(.34,1.56,.64,1);
    }
    .snode.pending { background:#f1f5f9; color:#94a3b8; }
    .snode.active  { background:linear-gradient(135deg,var(--p),var(--p2)); color:#fff; transform:scale(1.1); animation:nodePulse 2s ease infinite; }
    .snode.done    { background:var(--g); color:#fff; animation:nodeDone .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes nodePulse { 0%,100%{box-shadow:0 0 0 0 rgba(80,70,229,.4)} 50%{box-shadow:0 0 0 8px rgba(80,70,229,0)} }
    @keyframes nodeDone  { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
    .slabel { font-size:10px; font-weight:700; margin-top:4px; transition:color .3s; }
    .slabel.pending { color:#94a3b8; }
    .slabel.active  { color:var(--p); }
    .slabel.done    { color:var(--g); }
    .sline { flex:1; height:3px; border-radius:2px; margin:0 3px 18px; transition:background .5s; }
    .sline.pending { background:#e2e8f0; }
    .sline.done    { background:linear-gradient(90deg,var(--g),var(--g2)); }

    /* ── Cards ── */
    .card { background:#fff; border-radius:20px; box-shadow:0 1px 4px rgba(80,70,229,.07),0 6px 18px rgba(0,0,0,.05); }
    .card-active { box-shadow:0 2px 12px rgba(80,70,229,.14),0 12px 32px rgba(80,70,229,.09); }

    /* ── Accordion ── */
    .acc-body { overflow:hidden; max-height:0; opacity:0; transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease; }
    .acc-body.open { max-height:2400px; opacity:1; }
    .acc-chev { transition:transform .3s; }
    .acc-chev.closed { transform:rotate(-90deg); }

    /* ── Input ── */
    .field {
      width:100%; border:1.5px solid #e2e8f0; background:#f8faff;
      border-radius:16px; padding:14px 16px; color:#1e293b; line-height:1.65;
      transition:border-color .2s,background .2s,box-shadow .2s;
    }
    .field:focus { border-color:var(--p); background:#fff; box-shadow:0 0 0 3px rgba(80,70,229,.1); }
    .mono { font-family:'SF Mono','Fira Code',monospace; font-size:13px!important; color:#64748b; }

    /* ── CTA button ── */
    .cta {
      position:relative; overflow:hidden; border:none; cursor:pointer;
      width:100%; border-radius:16px; padding:16px 20px; color:#fff;
      font-weight:800; text-align:center; -webkit-appearance:none;
      background:linear-gradient(135deg,var(--p) 0%,var(--p2) 100%);
      box-shadow:0 6px 22px rgba(80,70,229,.42);
      transition:transform .12s,box-shadow .12s,background .35s;
    }
    .cta:active { transform:scale(.96); box-shadow:0 3px 10px rgba(80,70,229,.28); }
    .cta.done { background:linear-gradient(135deg,var(--g) 0%,var(--g2) 100%)!important; box-shadow:0 6px 22px rgba(5,150,105,.42)!important; }
    .cta-main { font-size:15px; }
    .cta-sub  { font-size:11px; opacity:.78; margin-top:3px; font-weight:600; }

    /* ── Parse btn ── */
    .btn-parse {
      width:100%; border:none; cursor:pointer; -webkit-appearance:none;
      border-radius:16px; padding:15px; color:#fff; font-size:15px; font-weight:800;
      background:linear-gradient(135deg,#059669,#34d399);
      box-shadow:0 6px 22px rgba(5,150,105,.38);
      transition:transform .12s;
    }
    .btn-parse:active { transform:scale(.96); }

    /* ── Ripple ── */
    .rip { position:absolute; border-radius:50%; background:rgba(255,255,255,.28); transform:scale(0); animation:ripA .65s ease-out forwards; pointer-events:none; }
    @keyframes ripA { to{transform:scale(5);opacity:0} }

    /* ── Tab transitions ── */
    .tabs-outer { position:relative; overflow:hidden; }
    .tab-pane { display:none; }
    .tab-pane.active { display:block; }
    .tab-slide-right { animation:tSlideR .3s cubic-bezier(.4,0,.2,1); }
    .tab-slide-left  { animation:tSlideL .3s cubic-bezier(.4,0,.2,1); }
    @keyframes tSlideR { from{opacity:0;transform:translateX(28px)} to{opacity:1;transform:none} }
    @keyframes tSlideL { from{opacity:0;transform:translateX(-28px)} to{opacity:1;transform:none} }

    /* ── Result reveal ── */
    .result-block { display:none; }
    .result-block.show { display:block; }
    .stagger-item { animation:staggerUp .28s cubic-bezier(.4,0,.2,1) both; }
    @keyframes staggerUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

    /* ── Phrase row ── */
    .prow { background:#f8faff; border:1.5px solid #e0e7ff; border-radius:15px; padding:12px 14px; }

    /* ── Score bar ── */
    .score-track { height:6px; background:#f1f5f9; border-radius:3px; }
    .score-fill  { height:6px; border-radius:3px; background:linear-gradient(90deg,var(--g),var(--g2)); transition:width 1.1s cubic-bezier(.4,0,.2,1); }

    /* ── Bottom nav ── */
    .bot-nav {
      position:fixed; bottom:0; left:0; right:0; z-index:40;
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(24px) saturate(180%);
      -webkit-backdrop-filter:blur(24px) saturate(180%);
      border-top:1px solid rgba(80,70,229,.08);
      padding-bottom:var(--safe-bot);
    }
    .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; padding:10px 0 8px; color:#94a3b8; transition:color .2s; font-size:10px; font-weight:700; }
    .nav-btn .ico { font-size:24px; line-height:1; transition:transform .2s cubic-bezier(.34,1.56,.64,1); }
    .nav-btn.active { color:var(--p); }
    .nav-btn.active .ico { transform:scale(1.12); }
    .nav-pip { width:4px; height:4px; border-radius:50%; background:var(--p); opacity:0; transition:opacity .2s; margin-top:2px; }
    .nav-btn.active .nav-pip { opacity:1; }

    /* ── Tag pill ── */
    .tpill { padding:5px 14px; border-radius:999px; font-size:12px; font-weight:700; white-space:nowrap; cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b; transition:all .15s; }
    .tpill.active { background:var(--p); border-color:var(--p); color:#fff; }

    /* ── Flashcard ── */
    .fc-scene { height:200px; perspective:1000px; cursor:pointer; }
    .fc-inner { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .52s cubic-bezier(.4,0,.2,1); }
    .fc-inner.flipped { transform:rotateY(180deg); }
    .fc-face { position:absolute; inset:0; border-radius:18px; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:22px; text-align:center; }
    .fc-back { transform:rotateY(180deg); }

    /* ── Toast ── */
    #toast { position:fixed; bottom:calc(78px + var(--safe-bot) + 10px); left:50%; transform:translateX(-50%) translateY(10px); background:rgba(15,23,42,.88); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); color:#fff; font-size:13px; font-weight:600; padding:10px 22px; border-radius:999px; z-index:200; pointer-events:none; white-space:nowrap; opacity:0; transition:opacity .28s,transform .28s; }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Celebration emojis ── */
    .cel { position:fixed; z-index:999; pointer-events:none; font-size:28px; animation:celFloat 1.3s ease forwards; }
    @keyframes celFloat { 0%{opacity:1;transform:translateY(0) scale(.8)} 60%{opacity:1;transform:translateY(-100px) scale(1.2)} 100%{opacity:0;transform:translateY(-180px) scale(.9)} }

    /* ── Step complete flash ── */
    @keyframes cardFlash { 0%,100%{background:#fff} 40%{background:#ecfdf5} }
    .flash-green { animation:cardFlash .5s ease; }

    /* ── Hint ── */
    .hint { background:#eef2ff; border:1px solid #c7d2fe; border-radius:14px; padding:11px 14px; display:flex; gap:10px; align-items:flex-start; }

    /* ── Section label ── */
    .slbl { font-size:10px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }

    /* ── Misc ── */
    .no-sb { -ms-overflow-style:none; scrollbar-width:none; }
    .no-sb::-webkit-scrollbar { display:none; }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ═══ HEADER ═══ -->
<header class="app-header">
  <div class="max-w-lg mx-auto flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-2xl bg-white/20 flex items-center justify-center text-xl">🌍</div>
      <div>
        <h1 class="text-white font-black text-[16px] leading-tight tracking-tight">英語チャットヘルパー</h1>
        <p class="text-white/55 text-[11px] font-medium mt-0.5">Messenger 英語コミュ補助</p>
      </div>
    </div>
    <button onclick="clearSession(true)" class="text-white/70 text-[12px] font-bold border border-white/20 bg-white/10 rounded-full px-3 py-1.5 active:bg-white/25 transition">
      リセット
    </button>
  </div>
</header>

<!-- ═══ STEPPER ═══ -->
<div class="stepper-bar">
  <div class="max-w-lg mx-auto flex items-start">
    <div class="flex flex-col items-center">
      <div id="sn1" class="snode active">1</div><span id="sl1" class="slabel active">受信</span>
    </div>
    <div id="sl12" class="sline pending"></div>
    <div class="flex flex-col items-center">
      <div id="sn2" class="snode pending">2</div><span id="sl2" class="slabel pending">分析</span>
    </div>
    <div id="sl23" class="sline pending"></div>
    <div class="flex flex-col items-center">
      <div id="sn3" class="snode pending">3</div><span id="sl3" class="slabel pending">返信</span>
    </div>
    <div id="sl34" class="sline pending"></div>
    <div class="flex flex-col items-center">
      <div id="sn4" class="snode pending">4</div><span id="sl4" class="slabel pending">添削</span>
    </div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<main class="max-w-lg mx-auto px-3 pt-4 tabs-outer">

  <!-- ══ TAB: チャット ══ -->
  <div id="tab-chat" class="tab-pane active space-y-3">

    <!-- STEP 1 -->
    <div id="sc1" class="card card-active">
      <button class="w-full text-left p-4 flex items-center gap-3" onclick="toggleAcc(1)">
        <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-xl flex-shrink-0">📩</div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-slate-800 text-[14px]">相手のメッセージ</p>
          <p id="s1sub" class="text-xs text-slate-400 truncate mt-0.5">メッセージを貼り付けてください</p>
        </div>
        <span id="ch1" class="acc-chev text-slate-300 text-xs">▼</span>
      </button>
      <div id="ab1" class="acc-body open">
        <div class="px-4 pb-5 space-y-3">
          <textarea id="received-msg" rows="4" oninput="onMsgInput()" class="field" placeholder="Messengerのメッセージをここに貼り付け…"></textarea>
          <button id="btn-an" onclick="copyAnalysisPrompt(event)" class="cta">
            <div class="cta-main">📋 分析プロンプトをコピー</div>
            <div class="cta-sub">→ Claude.ai に貼り付けて送信</div>
          </button>
        </div>
      </div>
    </div>

    <!-- STEP 2 -->
    <div id="sc2" class="card">
      <button class="w-full text-left p-4 flex items-center gap-3" onclick="toggleAcc(2)">
        <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-xl flex-shrink-0">🔍</div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-slate-800 text-[14px]">Claudeの分析を貼り付け</p>
          <p class="text-xs text-slate-400 mt-0.5">翻訳・フレーズ・返信候補が出ます</p>
        </div>
        <span id="ch2" class="acc-chev closed text-slate-300 text-xs">▼</span>
      </button>
      <div id="ab2" class="acc-body">
        <div class="px-4 pb-5 space-y-3">
          <div class="hint"><span class="text-base mt-0.5">💡</span><p class="text-xs text-indigo-600 leading-relaxed">ClaudeがJSON形式で返してくれます。<br>回答をそのままコピー＆ペーストしてください。</p></div>
          <textarea id="analysis-raw" rows="4" class="field mono" placeholder='{"translation":"…","keyPhrases":[…]}'></textarea>
          <button onclick="parseAnalysis()" class="btn-parse">✨ 分析結果を表示</button>
          <div id="analysis-results" class="result-block space-y-4">
            <div class="stagger-item" style="--d:0ms">
              <div style="background:linear-gradient(135deg,#eef2ff,#ede9fe);border:1.5px solid #c7d2fe" class="rounded-2xl p-4">
                <p class="slbl text-indigo-400">📝 日本語訳</p>
                <p id="r-trans" class="text-[15px] text-slate-800 font-semibold leading-relaxed"></p>
                <div id="r-tone-row" class="mt-2"><span id="r-tone" class="text-[11px] bg-white/70 border border-indigo-200 text-indigo-500 px-3 py-1 rounded-full font-bold"></span></div>
              </div>
            </div>
            <div class="stagger-item" style="--d:80ms">
              <p class="slbl text-slate-400 px-1">🔑 キーフレーズ</p>
              <div id="r-phrases" class="space-y-2"></div>
            </div>
            <div class="stagger-item" style="--d:160ms">
              <p class="slbl text-slate-400 px-1">💬 返信候補</p>
              <div id="r-replies" class="space-y-2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- STEP 3 -->
    <div id="sc3" class="card">
      <button class="w-full text-left p-4 flex items-center gap-3" onclick="toggleAcc(3)">
        <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-xl flex-shrink-0">✍️</div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-slate-800 text-[14px]">自分の返信を書く</p>
          <p class="text-xs text-slate-400 mt-0.5">日本語でもOK！英語でもOK！</p>
        </div>
        <span id="ch3" class="acc-chev closed text-slate-300 text-xs">▼</span>
      </button>
      <div id="ab3" class="acc-body">
        <div class="px-4 pb-5 space-y-3">
          <textarea id="my-reply" rows="4" class="field" placeholder="返信をここに書く…（日本語でもOK！）"></textarea>
          <button id="btn-co" onclick="copyCorrectionPrompt(event)" class="cta">
            <div class="cta-main">📋 添削プロンプトをコピー</div>
            <div class="cta-sub">→ Claude.ai に貼り付けて送信</div>
          </button>
        </div>
      </div>
    </div>

    <!-- STEP 4 -->
    <div id="sc4" class="card">
      <button class="w-full text-left p-4 flex items-center gap-3" onclick="toggleAcc(4)">
        <div class="w-10 h-10 rounded-2xl bg-indigo-50 flex items-center justify-center text-xl flex-shrink-0">📝</div>
        <div class="flex-1 min-w-0">
          <p class="font-black text-slate-800 text-[14px]">添削結果を貼り付け</p>
          <p class="text-xs text-slate-400 mt-0.5">ネイティブな表現に磨こう</p>
        </div>
        <span id="ch4" class="acc-chev closed text-slate-300 text-xs">▼</span>
      </button>
      <div id="ab4" class="acc-body">
        <div class="px-4 pb-5 space-y-3">
          <textarea id="correction-raw" rows="4" class="field mono" placeholder="Claudeの添削結果をここに貼り付け…"></textarea>
          <button onclick="parseCorrection()" class="btn-parse">✨ 添削結果を表示</button>
          <div id="correction-results" class="result-block space-y-4">
            <div class="stagger-item" style="--d:0ms">
              <div style="background:linear-gradient(135deg,#ecfdf5,#d1fae5);border:1.5px solid #6ee7b7" class="rounded-2xl p-4">
                <div class="flex items-center justify-between mb-2">
                  <p class="slbl text-emerald-500">✅ 添削後の文</p>
                  <button id="btn-cc" onclick="copyCorrectedText()" class="text-[12px] text-emerald-600 bg-white/70 border border-emerald-200 font-bold px-3 py-1 rounded-xl active:scale-95 transition-transform">コピー</button>
                </div>
                <p id="r-corrected" class="text-[17px] font-black text-slate-800 leading-relaxed"></p>
              </div>
            </div>
            <div id="r-sw" class="stagger-item card px-4 py-3 flex items-center gap-3" style="--d:80ms;display:none">
              <span class="text-xs text-slate-400 font-bold whitespace-nowrap">自然さ</span>
              <div class="flex-1 score-track"><div id="r-sf" class="score-fill" style="width:0%"></div></div>
              <span id="r-sl" class="text-xs font-black text-emerald-500 whitespace-nowrap"></span>
            </div>
            <div class="stagger-item" style="--d:160ms">
              <div style="background:#fffbeb;border:1.5px solid #fde68a" class="rounded-2xl p-4">
                <p class="slbl text-amber-500">💡 フィードバック</p>
                <p id="r-fb" class="text-[14px] text-slate-700 leading-relaxed"></p>
              </div>
            </div>
            <div id="r-cw" class="stagger-item" style="--d:240ms">
              <p class="slbl text-slate-400 px-1">🔧 修正箇所</p>
              <div id="r-cs" class="space-y-2"></div>
            </div>
            <div id="r-bw" class="stagger-item" style="--d:320ms">
              <p class="slbl text-slate-400 px-1">⭐ おすすめ表現</p>
              <div id="r-bs" class="space-y-2"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <button onclick="saveSession()" class="w-full card py-4 text-[13px] font-bold text-slate-500 flex items-center justify-center gap-2 active:bg-slate-50 transition mb-2">
      💾 この会話を保存してリセット
    </button>
  </div>

  <!-- ══ TAB: ナレッジ ══ -->
  <div id="tab-knowledge" class="tab-pane space-y-3">
    <div class="card p-3">
      <div class="flex items-center gap-2 bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3">
        <span class="text-slate-400">🔍</span>
        <input id="search-input" type="search" oninput="searchPhrases()" placeholder="フレーズ・単語を検索…" class="flex-1 bg-transparent text-slate-700 placeholder-slate-400 text-[14px]">
      </div>
      <div id="tag-row" class="flex gap-2 mt-2.5 overflow-x-auto no-sb pb-0.5"></div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div class="card p-5 text-center"><p id="stat-p" class="text-4xl font-black text-indigo-500 leading-none">0</p><p class="text-xs text-slate-400 mt-1.5 font-bold">保存フレーズ</p></div>
      <div class="card p-5 text-center"><p id="stat-h" class="text-4xl font-black text-violet-500 leading-none">0</p><p class="text-xs text-slate-400 mt-1.5 font-bold">会話履歴</p></div>
    </div>

    <!-- Flashcard -->
    <div class="card p-4">
      <div class="flex items-center justify-between mb-4">
        <div><p class="font-black text-slate-800 text-[14px]">🃏 フラッシュカード</p><p class="text-xs text-slate-400 mt-0.5">保存フレーズを復習</p></div>
        <div id="fc-tr" class="hidden items-center gap-2">
          <span id="fc-cnt" class="text-xs text-slate-400 font-bold"></span>
          <button onclick="endFC()" class="text-xs text-slate-400 border border-slate-200 rounded-xl px-2.5 py-1.5 font-bold active:bg-slate-50">終了</button>
        </div>
      </div>
      <div id="fc-start">
        <button onclick="startFC()" class="w-full rounded-2xl py-4 text-white text-[15px] font-black active:scale-[.97] transition-transform" style="background:linear-gradient(135deg,#7c3aed,#6366f1);box-shadow:0 6px 22px rgba(99,102,241,.42)">🃏 復習スタート</button>

              <p id="fc-fr" class="text-2xl font-black text-indigo-700"></p>
            </div>
            <div class="fc-face fc-back" style="background:linear-gradient(145deg,#ecfdf5,#d1fae5);border:2px solid #6ee7b7">
              <p class="text-[10px] text-emerald-500 font-black uppercase tracking-widest mb-2">意味</p>
              <p id="fc-me" class="text-lg font-black text-emerald-800 mb-2"></p>
              <p id="fc-us" class="text-xs text-emerald-600 leading-relaxed"></p>
            </div>
          </div>
        </div>
        <p class="text-center text-[11px] text-slate-400 font-medium">👆 タップして意味を確認</p>
        <div class="grid grid-cols-3 gap-2">
          <button onclick="fcAns('again')" class="bg-red-50 border border-red-100 text-red-500 rounded-2xl py-3 text-xs font-black active:scale-95 transition-transform leading-loose">😅<br>もう一度</button>
          <button onclick="fcAns('ok')"    class="bg-amber-50 border border-amber-100 text-amber-600 rounded-2xl py-3 text-xs font-black active:scale-95 transition-transform leading-loose">🤔<br>まあまあ</button>
          <button onclick="fcAns('good')"  class="bg-emerald-50 border border-emerald-100 text-emerald-700 rounded-2xl py-3 text-xs font-black active:scale-95 transition-transform leading-loose">👍<br>わかった！</button>

    <div class="card p-4">
      <div class="flex items-center justify-between mb-3">
        <p class="font-black text-slate-800 text-[14px]">保存フレーズ</p>
        <button onclick="exportData()" class="text-[12px] text-sky-500 border border-sky-200 rounded-xl px-3 py-1.5 font-bold active:scale-95 transition-transform">📤 エクスポート</button>
      </div>
      <div id="phrases-list"></div>

    <div class="card p-4">
      <p class="font-black text-slate-800 text-[14px] mb-3">会話履歴</p>
      <div id="history-list"></div>

    <button onclick="clearAllData()" class="w-full text-red-400 text-xs py-3 mb-2 font-bold">🗑 全データを削除</button>

<!-- ═══ BOTTOM NAV ═══ -->
<nav class="bot-nav">
  <div class="max-w-lg mx-auto flex">
    <button id="nav-chat"      onclick="switchTab('chat','left')"      class="nav-btn active"><span class="ico">💬</span><span>チャット</span><div class="nav-pip"></div></button>
    <button id="nav-knowledge" onclick="switchTab('knowledge','right')" class="nav-btn"><span class="ico">📚</span><span>ナレッジ</span><div class="nav-pip"></div></button>
  </div>
</nav>

<script>
// ── Storage ──
const KP='ech5_p',KH='ech5_h';
const getP=()=>{try{return JSON.parse(localStorage.getItem(KP)||'[]');}catch{return[];}};
const setP=a=>localStorage.setItem(KP,JSON.stringify(a));
const getH=()=>{try{return JSON.parse(localStorage.getItem(KH)||'[]');}catch{return[];}};
const setH=a=>localStorage.setItem(KH,JSON.stringify(a));

// ── Escape ──
const h=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Toast ──
let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2300);}

// ── Celebration ──
function celebrate(){
  const emos=['🎉','✨','🌟','🎊','🥳','💫','⭐','🎈','🪄','🏆'];
  for(let i=0;i<14;i++){
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='cel';
      el.textContent=emos[Math.floor(Math.random()*emos.length)];
      const sz=22+Math.random()*18;
      Object.assign(el.style,{
        fontSize:sz+'px',
        left:(5+Math.random()*90)+'%',
        bottom:(80+Math.random()*40)+'px',
        animationDuration:(.9+Math.random()*.7)+'s',
        animationDelay:(i*55)+'ms'
      });
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),1800);
    },i*55);
  }
}

// ── Clipboard ──
async function copy(txt){
  try{await navigator.clipboard.writeText(txt);return true;}catch{}
  try{const ta=Object.assign(document.createElement('textarea'),{value:txt,style:'position:fixed;top:0;left:0;opacity:0'});document.body.appendChild(ta);ta.focus();ta.select();const ok=document.execCommand('copy');document.body.removeChild(ta);return ok;}
  catch{return false;}
}

// ── Ripple ──
function ripple(btn,e){
  const r=btn.getBoundingClientRect(),sz=Math.max(r.width,r.height)*2;
  const sp=Object.assign(document.createElement('span'),{className:'rip'});
  Object.assign(sp.style,{width:sz+'px',height:sz+'px',left:(e.clientX-r.left-sz/2)+'px',top:(e.clientY-r.top-sz/2)+'px'});
  btn.appendChild(sp);setTimeout(()=>sp.remove(),700);
}

// ── Tab switch with slide direction ──
let currentTab='chat';
function switchTab(tab,dir){
  if(tab===currentTab) return;
  const next=document.getElementById('tab-'+tab);
  const prev=document.getElementById('tab-'+currentTab);
  prev.classList.remove('active');
  next.classList.add('active');
  next.classList.remove('tab-slide-right','tab-slide-left');
  void next.offsetWidth; // reflow
  next.classList.add(dir==='right'?'tab-slide-right':'tab-slide-left');
  ['chat','knowledge'].forEach(t=>{
    const nb=document.getElementById('nav-'+t);
    nb.classList.toggle('active',t===tab);
  });
  currentTab=tab;
  if(tab==='knowledge') renderKnowledge();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Stepper ──
function snState(n,state){
  const nd=document.getElementById('sn'+n),lb=document.getElementById('sl'+n);
  nd.className='snode '+state; lb.className='slabel '+state;
  nd.textContent=state==='done'?'✓':n;
}
function lineState(a,b,s){ const el=document.getElementById('sl'+a+b);if(el)el.className='sline '+s; }

function completeStep(n){
  snState(n,'done');
  document.getElementById('sc'+n).classList.remove('card-active');
  if(n<4) lineState(n,n+1,'done');
  // Card flash
  document.getElementById('sc'+n).classList.add('flash-green');
  setTimeout(()=>document.getElementById('sc'+n).classList.remove('flash-green'),500);
}

function activateStep(n){
  snState(n,'active');
  const sc=document.getElementById('sc'+n);
  sc.classList.add('card-active');
  openAcc(n);
  setTimeout(()=>sc.scrollIntoView({behavior:'smooth',block:'start'}),220);
}

// ── Accordion ──
function toggleAcc(n){
  const b=document.getElementById('ab'+n),c=document.getElementById('ch'+n);
  const open=b.classList.contains('open');
  b.classList.toggle('open',!open);
  c.classList.toggle('closed',open);
}
function openAcc(n){
  document.getElementById('ab'+n).classList.add('open');
  document.getElementById('ch'+n).classList.remove('closed');
}

// ── Step 1 ──
function onMsgInput(){
  const v=document.getElementById('received-msg').value.trim();
  document.getElementById('s1sub').textContent=v?v.substring(0,45)+(v.length>45?'…':''):'メッセージを貼り付けてください';
}

// ── Prompts ──
function buildAP(){
  const msg=document.getElementById('received-msg').value.trim();
  if(!msg) return null;
  return `以下の英語メッセージを分析してください。\n必ず以下のJSON形式のみで回答してください（コードブロック・説明文は不要です）。\n\n---\n${msg}\n---\n\n{\n  "translation": "完全な日本語訳",\n  "tone": "メッセージのトーン（例：カジュアル、フレンドリー、ビジネス的）",\n  "keyPhrases": [\n    {\n      "phrase": "英語表現",\n      "meaning": "日本語の意味",\n      "usage": "使い方・ニュアンス（1文）"\n    }\n  ],\n  "replySuggestions": [\n    {\n      "situation": "返信の方向性（例：同意する、質問する、感謝する）",\n      "english": "英語返信文",\n      "japanese": "日本語訳"\n    }\n  ]\n}`;
}

function buildCP(){
  const orig=document.getElementById('received-msg').value.trim();
  const rep=document.getElementById('my-reply').value.trim();
  if(!rep) return null;
  return `英語返信を添削してください。\n必ず以下のJSON形式のみで回答してください（コードブロック・説明文は不要です）。\n\n【相手のメッセージ】\n${orig||'（なし）'}\n\n【自分の返信（日本語の場合は英語に直してから添削してください）】\n${rep}\n\n{\n  "corrected": "添削・翻訳後の英文",\n  "naturalness": 85,\n  "feedback": "全体的なフィードバック（日本語・1〜2文）",\n  "corrections": [\n    {\n      "original": "元の表現",\n      "corrected": "修正後の表現",\n      "reason": "修正理由（日本語）"\n    }\n  ],\n  "bonusExpressions": [\n    {\n      "expression": "おすすめ表現",\n      "meaning": "意味・使い方（日本語）"\n    }\n  ]\n}`;
}

async function copyAnalysisPrompt(e){
  const p=buildAP();if(!p){toast('メッセージを入力してください');return;}
  const btn=document.getElementById('btn-an');ripple(btn,e);
  if(await copy(p)){
    btn.classList.add('done');
    btn.innerHTML='<div class="cta-main">✅ コピーしました！</div><div class="cta-sub">Claude.ai を開いて貼り付けてください</div>';
    completeStep(1);setTimeout(()=>activateStep(2),500);
    toast('コピー完了！Claude.ai で実行してください ✉️');
    setTimeout(()=>{btn.classList.remove('done');btn.innerHTML='<div class="cta-main">📋 分析プロンプトをコピー</div><div class="cta-sub">→ Claude.ai に貼り付けて送信</div>';},3500);
  }
}

async function copyCorrectionPrompt(e){
  const p=buildCP();if(!p){toast('返信を入力してください');return;}
  const btn=document.getElementById('btn-co');ripple(btn,e);
  if(await copy(p)){
    btn.classList.add('done');
    btn.innerHTML='<div class="cta-main">✅ コピーしました！</div><div class="cta-sub">Claude.ai を開いて貼り付けてください</div>';
    completeStep(3);setTimeout(()=>activateStep(4),500);
    toast('コピー完了！Claude.ai で実行してください ✉️');
    setTimeout(()=>{btn.classList.remove('done');btn.innerHTML='<div class="cta-main">📋 添削プロンプトをコピー</div><div class="cta-sub">→ Claude.ai に貼り付けて送信</div>';},3500);
  }
}

// ── JSON extract ──
function xj(raw){const m=raw.match(/\{[\s\S]*\}/);if(!m)throw 0;return JSON.parse(m[0]);}

// ── Stagger trigger ──
function triggerStagger(container){
  container.querySelectorAll('.stagger-item').forEach((el,i)=>{
    el.style.animationDelay=(i*80)+'ms';
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation='staggerUp .3s cubic-bezier(.4,0,.2,1) both';
    el.style.animationDelay=(i*80)+'ms';
  });
}

// ── Parse Analysis ──
function parseAnalysis(){
  const raw=document.getElementById('analysis-raw').value.trim();
  if(!raw){toast('Claudeの回答を貼り付けてください');return;}
  let d;try{d=xj(raw);}catch{d={translation:raw,tone:'',keyPhrases:[],replySuggestions:[]};}

  document.getElementById('r-trans').textContent=d.translation||'';
  document.getElementById('r-tone').textContent=d.tone||'';
  document.getElementById('r-tone-row').style.display=d.tone?'':'none';

  // Phrases
  const phEl=document.getElementById('r-phrases');phEl.innerHTML='';
  (d.keyPhrases||[]).forEach((p,i)=>{
    const div=document.createElement('div');div.className='prow';
    div.style.animationDelay=(i*60)+'ms';
    div.style.animation='staggerUp .28s cubic-bezier(.4,0,.2,1) both';
    div.innerHTML=`<div class="flex items-start gap-3"><div class="flex-1 min-w-0"><p class="font-black text-slate-800 text-[14px]">${h(p.phrase)}</p><p class="text-xs text-sky-500 font-bold mt-0.5">${h(p.meaning)}</p>${p.usage?`<p class="text-xs text-slate-400 mt-0.5 leading-relaxed">${h(p.usage)}</p>`:''}</div><button class="save-btn flex-shrink-0 text-[11px] bg-indigo-50 text-indigo-500 border border-indigo-100 rounded-xl px-2.5 py-1.5 font-black active:scale-95 transition-transform" data-phrase="${h(p.phrase)}" data-meaning="${h(p.meaning)}" data-usage="${h(p.usage||'')}" data-source="分析">保存</button></div>`;
    phEl.appendChild(div);
  });

  // Replies
  const rpEl=document.getElementById('r-replies');rpEl.innerHTML='';
  (d.replySuggestions||[]).forEach((r,i)=>{
    const div=document.createElement('div');div.className='prow';
    div.style.background='#f0f9ff';div.style.borderColor='#bae6fd';
    div.style.animationDelay=(i*60)+'ms';
    div.style.animation='staggerUp .28s cubic-bezier(.4,0,.2,1) both';
    div.innerHTML=`<p class="text-[10px] text-sky-500 font-black uppercase tracking-wider mb-1.5">${h(r.situation)}</p><p class="text-[15px] font-black text-slate-800">${h(r.english)}</p><p class="text-xs text-slate-400 mt-0.5">${h(r.japanese)}</p><button class="use-btn mt-2.5 text-[12px] text-sky-500 font-black bg-white border border-sky-200 rounded-xl px-3 py-1.5 active:scale-95 transition-transform" data-t="${h(r.english)}">→ この文を返信として使う</button>`;
    rpEl.appendChild(div);
  });

  const res=document.getElementById('analysis-results');
  res.classList.add('show');
  triggerStagger(res);
  completeStep(2);setTimeout(()=>activateStep(3),400);
}

// ── Parse Correction ──
function parseCorrection(){
  const raw=document.getElementById('correction-raw').value.trim();
  if(!raw){toast('Claudeの添削結果を貼り付けてください');return;}
  let d;try{d=xj(raw);}catch{d={corrected:raw,naturalness:null,feedback:'',corrections:[],bonusExpressions:[]};}

  document.getElementById('r-corrected').textContent=d.corrected||'';

  const sw=document.getElementById('r-sw');
  if(d.naturalness!=null){
    sw.style.display='flex';
    const s=Math.min(100,Math.max(0,parseInt(d.naturalness)||0));
    requestAnimationFrame(()=>{
      document.getElementById('r-sf').style.width=s+'%';
      document.getElementById('r-sl').textContent=s+'/100';
    });
  } else { sw.style.display='none'; }

  document.getElementById('r-fb').textContent=d.feedback||'';

  const cEl=document.getElementById('r-cs');cEl.innerHTML='';
  const cs=d.corrections||[];
  document.getElementById('r-cw').style.display=cs.length?'':'none';
  cs.forEach((c,i)=>{
    const div=document.createElement('div');div.className='prow';
    div.style.background='#fff7ed';div.style.borderColor='#fed7aa';
    div.style.animationDelay=(i*60)+'ms';
    div.style.animation='staggerUp .28s cubic-bezier(.4,0,.2,1) both';
    div.innerHTML=`<p class="text-xs text-red-400 line-through mb-1">${h(c.original)}</p><p class="text-[14px] font-black text-emerald-700">→ ${h(c.corrected)}</p><p class="text-xs text-slate-400 mt-1 leading-relaxed">${h(c.reason)}</p>`;
    cEl.appendChild(div);
  });

  const bEl=document.getElementById('r-bs');bEl.innerHTML='';
  const bs=d.bonusExpressions||[];
  document.getElementById('r-bw').style.display=bs.length?'':'none';
  bs.forEach((b,i)=>{
    const div=document.createElement('div');div.className='prow';
    div.style.animationDelay=(i*60)+'ms';
    div.style.animation='staggerUp .28s cubic-bezier(.4,0,.2,1) both';
    div.innerHTML=`<div class="flex items-start gap-3"><div class="flex-1 min-w-0"><p class="font-black text-slate-800 text-[14px]">${h(b.expression)}</p><p class="text-xs text-slate-400 mt-0.5 leading-relaxed">${h(b.meaning)}</p></div><button class="save-btn flex-shrink-0 text-[11px] bg-amber-50 text-amber-600 border border-amber-100 rounded-xl px-2.5 py-1.5 font-black active:scale-95 transition-transform" data-phrase="${h(b.expression)}" data-meaning="${h(b.meaning)}" data-usage="" data-source="添削">保存</button></div>`;
    bEl.appendChild(div);
  });

  const res=document.getElementById('correction-results');
  res.classList.add('show');
  triggerStagger(res);
  completeStep(4);
  // 🎉 全完了！
  setTimeout(()=>{celebrate();toast('🎉 全ステップ完了！お疲れさまでした！');},300);
}

async function copyCorrectedText(){
  const t=document.getElementById('r-corrected').textContent;if(!t)return;
  if(await copy(t)){
    const btn=document.getElementById('btn-cc');
    Object.assign(btn.style,{background:'#059669',color:'#fff',borderColor:'#059669'});
    btn.textContent='✅ コピー！';
    setTimeout(()=>{btn.textContent='コピー';Object.assign(btn.style,{background:'',color:'',borderColor:''}); },1800);
    toast('コピーしました！');
  }
}

// ── Save phrase ──
function savePhrase(phrase,meaning,usage,source){
  const list=getP();
  if(list.some(p=>p.phrase===phrase)){toast('すでに保存済みです');return;}
  list.push({id:Date.now(),phrase,meaning,usage,source,savedAt:new Date().toISOString(),reviewCount:0,knownCount:0});
  setP(list);toast(`「${phrase}」を保存！📚`);
}

// ── Session ──
function saveSession(){
  const orig=document.getElementById('received-msg').value.trim();
  const rep=document.getElementById('my-reply').value.trim();
  if(!orig&&!rep){toast('保存する内容がありません');return;}
  const hist=getH();
  hist.push({id:Date.now(),date:new Date().toISOString(),originalMessage:orig,myReply:rep,correctedReply:document.getElementById('r-corrected').textContent||''});
  if(hist.length>100)hist.splice(0,hist.length-100);
  setH(hist);clearSession(false);toast('会話を保存しました！');
}

function clearSession(ask){
  if(ask&&!confirm('リセットしますか？'))return;
  ['received-msg','analysis-raw','my-reply','correction-raw'].forEach(id=>document.getElementById(id).value='');
  ['analysis-results','correction-results'].forEach(id=>document.getElementById(id).classList.remove('show'));
  onMsgInput();
  for(let i=1;i<=4;i++)snState(i,i===1?'active':'pending');
  ['sl12','sl23','sl34'].forEach(id=>{const el=document.getElementById(id);if(el)el.className='sline pending';});
  for(let i=1;i<=4;i++){
    const b=document.getElementById('ab'+i),c=document.getElementById('ch'+i),sc=document.getElementById('sc'+i);
    if(i===1){b.classList.add('open');c.classList.remove('closed');sc.classList.add('card-active');}
    else{b.classList.remove('open');c.classList.add('closed');sc.classList.remove('card-active');}
  }
  const an=document.getElementById('btn-an'),co=document.getElementById('btn-co');
  an.classList.remove('done');co.classList.remove('done');
  an.innerHTML='<div class="cta-main">📋 分析プロンプトをコピー</div><div class="cta-sub">→ Claude.ai に貼り付けて送信</div>';
  co.innerHTML='<div class="cta-main">📋 添削プロンプトをコピー</div><div class="cta-sub">→ Claude.ai に貼り付けて送信</div>';
}

// ── Knowledge ──
let activeTag='all';
function renderKnowledge(){
  const p=getP(),hh=getH();
  document.getElementById('stat-p').textContent=p.length;
  document.getElementById('stat-h').textContent=hh.length;
  const srcs=['all',...new Set(p.map(x=>x.source).filter(Boolean))];
  document.getElementById('tag-row').innerHTML=srcs.map(t=>`<button class="tpill${t===activeTag?' active':''}" onclick="filterTag('${h(t)}')">${t==='all'?'すべて':h(t)}</button>`).join('');
  renderPL(p);renderHL(hh);
}

function renderPL(phrases){
  let list=[...phrases];
  if(activeTag!=='all')list=list.filter(p=>p.source===activeTag);
  const q=(document.getElementById('search-input').value||'').toLowerCase().trim();
  if(q)list=list.filter(p=>(p.phrase+p.meaning).toLowerCase().includes(q));
  list.reverse();
  const el=document.getElementById('phrases-list');
  if(!list.length){el.innerHTML=`<div class="text-center py-10"><p class="text-4xl mb-3">${q?'🔍':'📭'}</p><p class="text-sm text-slate-400 font-bold">${q?'見つかりません':'まだ保存されていません'}</p></div>`;return;}
  el.innerHTML=list.map((p,i)=>`<div class="prow mb-2" style="animation:staggerUp .24s cubic-bezier(.4,0,.2,1) ${i*40}ms both"><div class="flex items-start gap-3"><div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap mb-0.5"><p class="font-black text-slate-800 text-[14px]">${h(p.phrase)}</p>${p.source?`<span class="text-[10px] bg-indigo-50 text-indigo-400 px-2 py-0.5 rounded-md font-bold">${h(p.source)}</span>`:''}</div><p class="text-xs text-sky-500 font-bold">${h(p.meaning)}</p>${p.usage?`<p class="text-xs text-slate-400 mt-0.5 leading-relaxed">${h(p.usage)}</p>`:''}<p class="text-[10px] text-slate-300 mt-1 font-medium">${new Date(p.savedAt).toLocaleDateString('ja-JP')}${p.reviewCount?` · 復習${p.reviewCount}回`:''}</p></div><button class="del-btn text-slate-300 text-sm px-2 py-1 active:text-red-400 transition-colors font-bold" data-id="${p.id}">✕</button></div></div>`).join('');
}

function renderHL(history){
  const el=document.getElementById('history-list');
  const rec=[...history].reverse().slice(0,20);
  if(!rec.length){el.innerHTML='<div class="text-center py-10"><p class="text-4xl mb-3">📜</p><p class="text-sm text-slate-400 font-bold">まだ履歴がありません</p></div>';return;}
  el.innerHTML=rec.map((item,i)=>`<div class="prow mb-2" style="animation:staggerUp .24s cubic-bezier(.4,0,.2,1) ${i*40}ms both"><p class="text-[10px] text-slate-400 mb-1 font-bold">${new Date(item.date).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})}</p><p class="text-xs text-slate-600 leading-relaxed">${h((item.originalMessage||'').substring(0,80))}${(item.originalMessage||'').length>80?'…':''}</p>${item.correctedReply?`<p class="text-xs text-emerald-500 font-bold mt-1">→ ${h(item.correctedReply.substring(0,80))}${item.correctedReply.length>80?'…':''}</p>`:''}</div>`).join('');
}

function searchPhrases(){renderPL(getP());}
function filterTag(tag){
  activeTag=tag;
  document.querySelectorAll('.tpill').forEach(b=>b.classList.toggle('active',(tag==='all'&&b.textContent==='すべて')||b.textContent===tag));
  renderPL(getP());
}
function deletePhrase(id){setP(getP().filter(p=>p.id!==id));renderKnowledge();toast('削除しました');}

// ── Flashcard ──
let fcDeck=[],fcIdx=0;
function startFC(){
  const p=getP();if(!p.length){toast('フレーズを保存してから使ってください');return;}
  fcDeck=[...p].sort(()=>Math.random()-.5);fcIdx=0;
  document.getElementById('fc-start').classList.add('hidden');
  document.getElementById('fc-play').classList.remove('hidden');
  const tr=document.getElementById('fc-tr');tr.classList.remove('hidden');tr.classList.add('flex');
  showFCCard();
}
function showFCCard(){
  if(fcIdx>=fcDeck.length){endFC();toast('🎉 復習完了！');celebrate();return;}
  const c=fcDeck[fcIdx];
  document.getElementById('fc-fr').textContent=c.phrase;
  document.getElementById('fc-me').textContent=c.meaning;
  document.getElementById('fc-us').textContent=c.usage||'';
  document.getElementById('fc-cnt').textContent=`${fcIdx+1} / ${fcDeck.length}`;
  document.getElementById('fc-inner').classList.remove('flipped');
}
function flipFC(){document.getElementById('fc-inner').classList.toggle('flipped');}
function fcAns(r){
  const c=fcDeck[fcIdx],ps=getP(),i=ps.findIndex(p=>p.id===c.id);
  if(i>=0){ps[i].reviewCount=(ps[i].reviewCount||0)+1;if(r==='good')ps[i].knownCount=(ps[i].knownCount||0)+1;ps[i].lastReviewed=new Date().toISOString();setP(ps);}
  if(r==='again')fcDeck.push(fcDeck[fcIdx]);
  fcIdx++;showFCCard();
}
function endFC(){
  document.getElementById('fc-play').classList.add('hidden');
  document.getElementById('fc-start').classList.remove('hidden');
  const tr=document.getElementById('fc-tr');tr.classList.add('hidden');tr.classList.remove('flex');
}

// ── Export ──
function exportData(){
  const blob=new Blob([JSON.stringify({exportDate:new Date().toISOString(),phrases:getP(),history:getH()},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`ech-${new Date().toISOString().slice(0,10)}.json`});
  a.click();URL.revokeObjectURL(a.href);toast('エクスポートしました！');
}
function clearAllData(){
  if(!confirm('全データを削除しますか？'))return;
  localStorage.removeItem(KP);localStorage.removeItem(KH);renderKnowledge();toast('削除しました');
}

// ── Event delegation ──
document.addEventListener('click',e=>{
  const sb=e.target.closest('.save-btn');
  if(sb){savePhrase(sb.dataset.phrase,sb.dataset.meaning,sb.dataset.usage,sb.dataset.source);return;}
  const ub=e.target.closest('.use-btn');
  if(ub){document.getElementById('my-reply').value=ub.dataset.t;toast('返信欄にセットしました ✍️');setTimeout(()=>document.getElementById('sc3').scrollIntoView({behavior:'smooth',block:'start'}),100);return;}
  const db=e.target.closest('.del-btn');
  if(db){deletePhrase(Number(db.dataset.id));return;}
});

// ── Init ──
renderKnowledge();
</script>
